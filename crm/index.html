<script>
const SUPA_URL="__SUPABASE_URL__";
const SUPA_KEY="__SUPABASE_ANON_KEY__";

// ── COMPTE TECHNIQUE SUPABASE AUTH ──────────────────────────────
// Ce compte permet à l'app de s'authentifier auprès de Supabase
// (nécessaire pour que les policies RLS "authenticated only" laissent
// passer les requêtes). Ce n'est PAS le login visible des employés —
// ça reste le PIN. Ce compte est juste la "carte d'accès" technique.
const APP_AUTH_EMAIL="contact@maisonsolnoble.com";
const APP_AUTH_PASSWORD="__CRM_AUTH_PASSWORD__"; // ⚠️ remplacé automatiquement au build par Render (voir build.sh) — ne jamais mettre le vrai mot de passe ici

let _appAuthToken=null;
let _appAuthPromise=null;

async function getAppAuthToken(){
  if(_appAuthToken)return _appAuthToken;
  if(_appAuthPromise)return _appAuthPromise;
  _appAuthPromise=(async()=>{
    try{
      const r=await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`,{
        method:"POST",
        headers:{apikey:SUPA_KEY,"Content-Type":"application/json"},
        body:JSON.stringify({email:APP_AUTH_EMAIL,password:APP_AUTH_PASSWORD})
      });
      const data=await r.json();
      if(data&&data.access_token){
        _appAuthToken=data.access_token;
        return _appAuthToken;
      }
      console.error("Échec auth app Supabase :",data);
      return null;
    }catch(e){
      console.error("Erreur réseau auth app Supabase :",e);
      return null;
    }finally{
      _appAuthPromise=null;
    }
  })();
  return _appAuthPromise;
}

async function api(path,opts={},token=null){
  try{
    const authToken=token||await getAppAuthToken()||SUPA_KEY;
    const r=await fetch(`${SUPA_URL}/rest/v1/${path}`,{headers:{apikey:SUPA_KEY,Authorization:`Bearer ${authToken}`,"Content-Type":"application/json",Prefer:"return=representation"},...opts});
    const t=await r.text();return t?JSON.parse(t):null;
  }catch{return null;}
}

async function loadDevisFromSupabase(){
  const remote=await api("devis?order=created_at.desc&limit=500");
  if(remote&&Array.isArray(remote)&&remote.length){
    localStorage.setItem("msn_devis",JSON.stringify(remote));
    return remote;
  }
  // fallback localStorage
  try{return JSON.parse(localStorage.getItem("msn_devis")||"[]");}catch{return [];}
}

async function saveDevisToSupabase(payload){
  // Upsert en Supabase
  const r=await api("devis",{method:"POST",body:JSON.stringify(payload)});
  // Toujours sauvegarder en local aussi
  const local=JSON.parse(localStorage.getItem("msn_devis")||"[]");
  const updated=[payload,...local.filter(d=>d.numero!==payload.numero)];
  localStorage.setItem("msn_devis",JSON.stringify(updated));
  return r;
}

async function updateDevisSupabase(numero,patch){
  await api(`devis?numero=eq.${encodeURIComponent(numero)}`,{method:"PATCH",body:JSON.stringify(patch)});
  const local=JSON.parse(localStorage.getItem("msn_devis")||"[]");
  const updated=local.map(d=>d.numero===numero?{...d,...patch}:d);
  localStorage.setItem("msn_devis",JSON.stringify(updated));
}

async function deleteDevisSupabase(numero){
  await api(`devis?numero=eq.${encodeURIComponent(numero)}`,{method:"DELETE"});
  const local=JSON.parse(localStorage.getItem("msn_devis")||"[]");
  localStorage.setItem("msn_devis",JSON.stringify(local.filter(d=>d.numero!==numero)));
  S.devis=S.devis.filter(d=>d.numero!==numero);
}

// ── SYSTÈME AUTH PIN LOCAL ────────────────────────────────────
// Les comptes sont stockés en localStorage
// Format: {email, nom, role, pin_hash, actif, created_at}

function getComptes(){
  try{return JSON.parse(localStorage.getItem("msn_comptes")||"[]");}catch{return[];}
}

function saveComptes(comptes){
  localStorage.setItem("msn_comptes",JSON.stringify(comptes));
}

function hashPin(pin){
  // Hash simple du PIN (suffisant pour usage local)
  let h=0;
  const str=pin+"MSN2026SALT";
  for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}
  return h.toString(36);
}

function loginPin(email,pin){
  const comptes=getComptes();
  const compte=comptes.find(c=>c.email.toLowerCase()===email.toLowerCase()&&c.actif!==false);
  if(!compte)throw new Error("Compte introuvable ou désactivé");
  if(compte.pin_hash!==hashPin(pin))throw new Error("PIN incorrect");
  // Générer un token de session local
  const token="msn_"+Date.now()+"_"+Math.random().toString(36).slice(2);
  localStorage.setItem("msn_token",token);
  localStorage.setItem("msn_session",JSON.stringify({token,email:compte.email,nom:compte.nom,role:compte.role,exp:Date.now()+86400000*7}));
  return compte;
}

function getSession(){
  try{
    const s=JSON.parse(localStorage.getItem("msn_session")||"null");
    if(!s||Date.now()>s.exp)return null;
    return s;
  }catch{return null;}
}

function logoutLocal(){
  localStorage.removeItem("msn_token");
  localStorage.removeItem("msn_session");
}

function creerCompte(email,nom,role){
  const comptes=getComptes();
  if(comptes.find(c=>c.email.toLowerCase()===email.toLowerCase())){
    throw new Error("Ce compte existe déjà");
  }
  const id="id_"+Date.now();
  const compte={
    id,
    email:email.toLowerCase().trim(),
    nom,role,
    pin_hash:null,
    actif:true,
    token_activation:null,
    created_at:new Date().toISOString()
  };
  comptes.push(compte);
  saveComptes(comptes);
  // Encoder toutes les infos dans le lien (fonctionne sur n'importe quel appareil)
  const data=btoa(JSON.stringify({id,email:email.toLowerCase().trim(),nom,role,created_at:compte.created_at}));
  const lien=window.location.origin+"/crm/?newuser="+encodeURIComponent(data);
  return {compte,lien};
}

function activerCompte(data_encoded,pin){
  try{
    // Décoder les données du lien
    const data=JSON.parse(atob(decodeURIComponent(data_encoded)));
    const comptes=getComptes();
    // Vérifier si le compte existe déjà (même appareil)
    const existing=comptes.findIndex(c=>c.email===data.email);
    if(existing!==-1){
      // Mettre à jour le PIN
      comptes[existing].pin_hash=hashPin(pin);
      saveComptes(comptes);
      return comptes[existing];
    }
    // Créer le compte sur cet appareil
    const compte={...data,pin_hash:hashPin(pin),actif:true,token_activation:null};
    comptes.push(compte);
    saveComptes(comptes);
    return compte;
  }catch(e){
    throw new Error("Lien invalide ou corrompu");
  }
}

function setupDirecteurPin(pin){
  // Setup spécial pour le directeur sans token
  const comptes=getComptes();
  const idx=comptes.findIndex(c=>c.role==="directeur");
  if(idx===-1)throw new Error("Compte directeur introuvable");
  comptes[idx].pin_hash=hashPin(pin);
  comptes[idx].token_activation=null;
  saveComptes(comptes);
  return comptes[idx];
}

function getCompteByEmail(email){
  return getComptes().find(c=>c.email.toLowerCase()===email.toLowerCase());
}

function updateCompte(id,patch){
  const comptes=getComptes();
  const idx=comptes.findIndex(c=>c.id===id);
  if(idx!==-1){comptes[idx]={...comptes[idx],...patch};saveComptes(comptes);}
}

function deleteCompte(id){
  const comptes=getComptes().filter(c=>c.id!==id);
  saveComptes(comptes);
}

// Initialiser compte directeur par défaut si vide
function initDirecteur(){
  const comptes=getComptes();
  const idx=comptes.findIndex(c=>c.role==="directeur");
  if(idx===-1){
    // Pas de directeur — créer sans PIN (setup au 1er lancement)
    comptes.push({
      id:"id_directeur",
      email:"contact@maisonsolnoble.com",
      nom:"TAHAR Adam",
      role:"directeur",
      pin_hash:null,
      actif:true,
      token_activation:null,
      created_at:new Date().toISOString()
    });
    saveComptes(comptes);
  } else if(comptes[idx].pin_hash===hashPin("0000")){
    // Ancien compte avec PIN par défaut — reset pour forcer setup
    comptes[idx].pin_hash=null;
    saveComptes(comptes);
  }
}

function el(tag,props,...kids){
  const e=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="className")e.className=v;else e.setAttribute(k,v);});
  kids.flat(99).forEach(c=>{if(c!=null&&c!==false)e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});
  return e;
}

    const btn=el("button",{type:"button",style:{background:"#f8f7f3",border:"1px solid #e8e4dc",color:k==="⌫"?"#b08030":"#2a2520",fontSize:k==="⌫"?"20px":"22px",fontWeight:"500",padding:"16px 10px",borderRadius:"12px",cursor:"pointer",transition:"background 0.1s",minHeight:"56px"}});
    btn.textContent=String(k);
    btn.addEventListener("click",()=>k==="⌫"?delDigit():addDigit(String(k)));
    btn.addEventListener("mousedown",e=>{e.preventDefault();btn.style.background="#e8e4dc";});
    btn.addEventListener("mouseup",()=>btn.style.background="#f8f7f3");
    keypad.appendChild(btn);
  });
  pinWrap.appendChild(pinCases);pinWrap.appendChild(keypad);
  form.appendChild(pinWrap);
  if(S.loginError)form.appendChild(el("div",{style:{background:"rgba(163,45,45,0.15)",border:"1px solid rgba(163,45,45,0.3)",borderRadius:"6px",padding:"0.7rem 1rem",marginBottom:"1rem",fontSize:"13px",color:"#e07070",textAlign:"center"}},S.loginError));
  const btn=el("button",{type:"submit",style:{...BP,width:"100%",padding:"0.9rem",opacity:S.loginLoading?"0.7":"1"}},S.loginLoading?"Connexion...":"Se connecter");
  form.appendChild(btn);
  // Anti-brute-force : 5 tentatives max → blocage 15 min
  function getLoginBlock(){
    try{
      const b=JSON.parse(localStorage.getItem("msn_login_block")||"{}");
      if(b.until&&Date.now()<b.until)return b;
      if(b.until&&Date.now()>=b.until){localStorage.removeItem("msn_login_block");return{};}
      return b;
    }catch{return{};}
  }
  function recordFailedAttempt(){
    const b=getLoginBlock();
    const attempts=(b.attempts||0)+1;
    if(attempts>=5){
      localStorage.setItem("msn_login_block",JSON.stringify({attempts,until:Date.now()+15*60*1000}));
    }else{
      localStorage.setItem("msn_login_block",JSON.stringify({attempts}));
    }
    return attempts;
  }
  function clearLoginBlock(){localStorage.removeItem("msn_login_block");}

  // Afficher blocage si actif
  const blockState=getLoginBlock();
  if(blockState.until){
    const remaining=Math.ceil((blockState.until-Date.now())/60000);
    const blockDiv=el("div",{style:{background:"rgba(163,45,45,0.1)",border:"1px solid rgba(163,45,45,0.3)",borderRadius:"8px",padding:"1rem",marginBottom:"1rem",textAlign:"center"}});
    blockDiv.appendChild(el("div",{style:{color:"#e07070",fontSize:"13px",fontWeight:"600",marginBottom:"4px"}},`Trop de tentatives — bloqué ${remaining} min`));
    blockDiv.appendChild(el("div",{style:{color:"#b08080",fontSize:"12px"}},`Réessaie après ${new Date(blockState.until).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}`));
    form.insertBefore(blockDiv,btn);
    btn.disabled=true;btn.style.opacity="0.5";
  }

  form.addEventListener("submit",e=>{
    e.preventDefault();
    // Vérifier blocage
    const block=getLoginBlock();
    if(block.until){
      const remaining=Math.ceil((block.until-Date.now())/60000);
      set({loginError:`Compte temporairement bloqué. Réessaie dans ${remaining} min.`});
      return;
    }
    set({loginLoading:true,loginError:""});
    try{
      const compte=loginPin(S.loginEmail,S.loginPin||pinVal);
      clearLoginBlock();
      set({page:"crm",session:getSession(),role:compte.role,devis:[],loading:true,loginLoading:false,loginPin:"",loginError:""});
      loadTarifsFromSupabase();
      startPolling();
      loadDevisFromSupabase().then(devis=>{
        set({devis:devis.length?devis:DEMO_DEVIS,loading:false});
      });
      pinVal="";updateDots();
    }catch(err){
      pinVal="";updateDots();S.loginPin="";
      const attempts=recordFailedAttempt();
      const remaining=5-attempts;
      const msg=remaining<=0
        ?`Trop de tentatives. Compte bloqué 15 minutes.`
        :err.message+(remaining<=2?` (${remaining} tentative${remaining>1?"s":""} restante${remaining>1?"s":""})` : "");
      set({loginLoading:false,loginError:msg});
    }
  });
  card.appendChild(form);
  box.appendChild(logo);box.appendChild(card);
  box.appendChild(el("p",{style:{textAlign:"center",fontSize:"11px",color:"#b0a898",marginTop:"1.5rem"}},"Accès réservé — Maison Sol Noble"));
  // Lien reset urgence
  const resetLink=el("p",{style:{textAlign:"center",marginTop:"0.8rem"}});
  const rl=el("button",{style:{background:"none",border:"none",color:"#b0a898",fontSize:"11px",cursor:"pointer",textDecoration:"underline"}},"Problème de connexion ? Réinitialiser");
  rl.addEventListener("click",()=>{
    if(confirm("Réinitialiser tous les comptes ? Vos devis seront conservés.")){
      const devis=localStorage.getItem("msn_devis");
      localStorage.clear();
      if(devis)localStorage.setItem("msn_devis",devis);
      window.location.reload();
    }
  });
  resetLink.appendChild(rl);
  box.appendChild(resetLink);
  wrap.appendChild(box);return wrap;
}

// Écran de setup PIN (premier accès depuis lien)
function renderSetup(){
  const wrap=el("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f5f4f0",padding:"1rem"}});
  const box=el("div",{style:{width:"100%",maxWidth:"380px"}});
  const logo=el("div",{style:{textAlign:"center",marginBottom:"2rem"}});
  logo.appendChild(el("div",{style:{fontSize:"11px",letterSpacing:"0.25em",color:"#c9a84c",textTransform:"uppercase"}},"Maison"));
  logo.appendChild(el("div",{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:"2rem",color:"#1a1611",fontWeight:"300"}},"Sol Noble"));
  const card=el("div",{style:{background:"#ffffff",border:"1px solid #e8e4dc",borderRadius:"12px",padding:"2rem"}});
  card.appendChild(el("div",{style:{textAlign:"center",marginBottom:"1.5rem"}},[
    el("div",{style:{fontSize:"32px",marginBottom:"8px"}},"🔐"),
    el("h2",{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:"20px",color:"#1a1611",fontWeight:"400",marginBottom:"6px"}},"Créez votre PIN"),
    el("p",{style:{fontSize:"13px",color:"#8a8278"}},S.setupEmail?"Compte : "+S.setupEmail:"Choisissez un code PIN à 4 chiffres")
  ]));
  let pin1="",pin2="",etape=1;
  const titre=el("div",{style:{fontSize:"12px",color:"#c9a84c",textAlign:"center",marginBottom:"10px",letterSpacing:"0.1em",textTransform:"uppercase"}},"Choisissez votre PIN");
  card.appendChild(titre);
  // Cases PIN
  const pinCases=el("div",{style:{display:"flex",gap:"10px",justifyContent:"center",marginBottom:"12px"}});
  const dots=[];
  for(let i=0;i<4;i++){
    const dot=el("div",{style:{width:"52px",height:"56px",background:"#f5f4f0",border:"1px solid #dddad2",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",color:"#c9a84c"}});
    dots.push(dot);pinCases.appendChild(dot);
  }
  card.appendChild(pinCases);
  let current="";
  function updateDots2(){dots.forEach((d,i)=>{d.textContent=i<current.length?"●":"";d.style.borderColor=i<current.length?"rgba(201,168,76,0.6)":"#dddad2";});}
  const msgDiv=el("div",{style:{textAlign:"center",fontSize:"13px",color:"#3B6D11",marginBottom:"10px",minHeight:"20px"}});
  card.appendChild(msgDiv);
  const errDiv=el("div",{style:{textAlign:"center",fontSize:"13px",color:"#e07070",marginBottom:"10px",minHeight:"20px"}});
  card.appendChild(errDiv);
  // Keypad
  const keypad=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}});
  function addDigit2(d){
    if(current.length<4){current+=d;updateDots2();}
    if(current.length===4){
      setTimeout(()=>{
        if(etape===1){
          pin1=current;current="";etape=2;
          titre.textContent="Confirmez votre PIN";
          updateDots2();msgDiv.textContent="";
        }else{
          pin2=current;
          if(pin1===pin2){
            try{
              let compte;
              if(!S.setupToken||S.setupToken==="DIRECTEUR_SETUP"){
                compte=setupDirecteurPin(pin1);
              }else{
                compte=activerCompte(S.setupToken,pin1);
              }
              msgDiv.textContent="✓ PIN créé ! Redirection...";
              errDiv.textContent="";
              setTimeout(()=>{
                loginPin(compte.email,pin1);
                set({page:"crm",session:getSession(),role:compte.role,devis:[],loading:true});
              loadTarifsFromSupabase();startPolling();
              loadDevisFromSupabase().then(devis=>{set({devis:devis.length?devis:DEMO_DEVIS,loading:false});});
              },1000);
            }catch(e){errDiv.textContent="Erreur: "+e.message;}
          }else{
            errDiv.textContent="Les PINs ne correspondent pas. Recommencez.";
            pin1="";pin2="";current="";etape=1;
            titre.textContent="Choisissez votre PIN";
            updateDots2();
          }
        }
      },300);
    }
  }
  function delDigit2(){if(current.length>0){current=current.slice(0,-1);updateDots2();}}
  [1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(k=>{
    if(k===""){keypad.appendChild(el("div",{}));return;}
    const btn=el("button",{type:"button",style:{background:"#f8f7f3",border:"1px solid #e8e4dc",color:k==="⌫"?"#b08030":"#2a2520",fontSize:k==="⌫"?"18px":"20px",fontWeight:"500",padding:"14px",borderRadius:"6px",cursor:"pointer"}});
    btn.textContent=String(k);
    btn.addEventListener("click",()=>k==="⌫"?delDigit2():addDigit2(String(k)));
    keypad.appendChild(btn);
  });
  card.appendChild(keypad);
  box.appendChild(logo);box.appendChild(card);
  wrap.appendChild(box);return wrap;
}

function renderFormDevis(){
  const f=S.form,tarif=TARIFS[f.type_sol];
  const ht=f.surface?Math.round(f.prix_m2*parseFloat(f.surface)*COEFF[f.etat]):0;
  const form=el("form",{});
  function row(...items){
    if(isMobile()){
      // Sur mobile: empiler les champs verticalement
      const g=el("div",{});items.forEach(i=>g.appendChild(i));return g;
    }
    const g=el("div",{style:{display:"grid",gridTemplateColumns:`repeat(${items.length},1fr)`,gap:"1rem",marginBottom:"1rem"}});items.forEach(i=>g.appendChild(i));return g;
  }
  function inp(name,placeholder,type="text"){
    const i=el("input",{type,placeholder,value:f[name]||"",style:{fontSize:"16px"}}); // 16px évite zoom iOS
    i.addEventListener("input",e=>{S.form[name]=e.target.value;if(name==="surface"||name==="prix_m2")render();});
    return i;
  }
  function sel(name,options){
    const s=el("select",{style:{fontSize:"16px"}});
    options.forEach(([v,l])=>{const o=el("option",{value:v},l);if(f[name]===v)o.selected=true;s.appendChild(o);});
    s.addEventListener("change",e=>{S.form[name]=e.target.value;if(name==="type_sol"){S.form.travaux=TARIFS[e.target.value].trav[0];S.form.prix_m2=TARIFS[e.target.value].prix[0];}if(name==="travaux"){const idx=TARIFS[S.form.type_sol].trav.indexOf(e.target.value);S.form.prix_m2=TARIFS[S.form.type_sol].prix[idx]||S.form.prix_m2;}render();});
    return s;
  }
  form.appendChild(row(grp("Nom client *",inp("client_nom","Jean Dupont"),0),grp("Téléphone",inp("client_tel","06 12 34 56 78"),0)));
  form.appendChild(row(grp("Email",inp("client_email","client@email.com"),0),grp("Ville",inp("ville","Paris"),0)));
  form.appendChild(el("div",{style:{height:"1px",background:"#e8e4dc",margin:"0.5rem 0 1rem"}}));
  form.appendChild(row(grp("Type de sol *",sel("type_sol",Object.entries(TARIFS).map(([k,v])=>[k,v.label])),0),grp("État du sol",sel("etat",[["bon","Bon état"],["moyen","État moyen"],["mauvais","Mauvais état"]]),0)));
  form.appendChild(row(grp("Travaux *",sel("travaux",tarif.trav.map((t,i)=>[t,`${t} — ${tarif.prix[i]} €/m²`])),0),grp("Surface (m²) *",inp("surface","50","number"),0),grp("Prix/m²",inp("prix_m2","","number"),0)));
  const ta=el("textarea",{placeholder:"Précisions sur le chantier...",style:{minHeight:"70px",resize:"vertical"}});ta.textContent=f.description||"";ta.addEventListener("input",e=>S.form.description=e.target.value);
  form.appendChild(grp("Notes",ta));
  if(f.surface>0){
    const rc=el("div",{style:{background:"#f0eeea",border:"1px solid rgba(201,168,76,0.2)",borderRadius:"6px",padding:"1rem",marginBottom:"1.2rem"}});
    rc.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},[el("span",{style:{color:"#8a8278",fontSize:"13px"}},`${f.surface} m² × ${f.prix_m2} €/m² × coeff. ${COEFF[f.etat]}`)]));
    rc.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},[el("span",{style:{color:"#706a62",fontSize:"13px"}},"Montant HT"),el("span",{style:{color:"#1a1611",fontSize:"15px",fontWeight:"600"}},ht.toFixed(2)+" €")]));
    rc.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between"}},[el("span",{style:{color:"#706a62",fontSize:"13px"}},"TTC (TVA 20%)"),el("span",{style:{color:"#c9a84c",fontSize:"17px",fontWeight:"700"}},(ht*1.2).toFixed(2)+" €")]));
    form.appendChild(rc);
  }
  const btns=el("div",{style:{display:"flex",gap:"0.8rem",justifyContent:isMobile()?"stretch":"flex-end",flexDirection:isMobile()?"column":"row",marginTop:"8px"}});
  if(!isMobile()){const ba=el("button",{type:"button",style:BS},"Annuler");ba.addEventListener("click",()=>set({modal:null}));btns.appendChild(ba);}
  const bsub=el("button",{type:"submit",style:isMobile()?{}:BP},isMobile()?"":"Créer le devis");
  if(isMobile()){bsub.className="mob-btn-full";bsub.textContent="Créer le devis";}
  btns.appendChild(bsub);form.appendChild(btns);
  // Avertissement si un lead existe déjà pour ce client
  const existingLead=S.devis.find(d=>d.client_nom===f.client_nom&&f.client_nom&&isLead(d));
  if(existingLead){
    const notice=el("div",{style:{background:"rgba(59,109,17,0.07)",border:"1px solid rgba(59,109,17,0.25)",borderRadius:"8px",padding:"10px 14px",marginBottom:"1rem",fontSize:"12px",color:"#3B6D11",lineHeight:"1.5"}});
    notice.textContent="✓ Ce devis remplacera le lead "+existingLead.numero+" — aucun doublon ne sera créé.";
    form.insertBefore(notice,form.firstChild);
  }
  form.addEventListener("submit",async e=>{
    e.preventDefault();
    const lead=S.devis.find(d=>d.client_nom===S.form.client_nom&&isLead(d));
    if(lead){
      // Convertir le lead en devis : PATCH l'enregistrement existant
      const newNum=`MSN-${Date.now().toString().slice(-6)}`;
      const patch={...S.form,numero:newNum,montant_ht:ht,statut:"Nouveau",source:null,updated_at:new Date().toISOString()};
      await updateDevisSupabase(lead.numero,patch);
      S.devis=S.devis.map(d=>d.numero===lead.numero?{...d,...patch}:d);
    }else{
      // Aucun lead existant : créer un nouveau devis
      const num=`MSN-${Date.now().toString().slice(-6)}`;
      const payload={...S.form,numero:num,montant_ht:ht,statut:"Nouveau",created_at:new Date().toISOString()};
      await saveDevisToSupabase(payload);
      S.devis=[payload,...S.devis];
    }
    S.form={client_nom:"",client_tel:"",client_email:"",ville:"",type_sol:"marbre",travaux:"Polissage simple",surface:"",etat:"moyen",description:"",prix_m2:30};
    set({modal:null});
  });
  return form;
}

function renderFormEmploye(){
  let nomVal="",emailVal="",roleVal="employe";
  const wrap=el("div",{});
  wrap.appendChild(el("p",{style:{color:"#706a62",fontSize:"13px",marginBottom:"1.5rem"}},"Remplis les infos et clique Générer le lien. Un lien de connexion direct est créé — tu l'envoies par SMS ou WhatsApp à l'employé. Il clique et accède directement au CRM."));
  const form=el("form",{});
  
  function inp2(placeholder,type="text",onInput){const i=el("input",{type,placeholder});i.addEventListener("input",e=>onInput(e.target.value));return i;}
  
  form.appendChild(grp("Nom complet *",inp2("Prénom Nom","text",v=>nomVal=v)));
  form.appendChild(grp("Email *",inp2("employe@email.com","email",v=>emailVal=v)));

  
  const rg=el("div",{style:{marginBottom:"1rem"}});
  rg.appendChild(lbl("Rôle *"));
  const rs=el("select",{});
  Object.entries(ROLES).filter(([k])=>k!=="directeur").forEach(([k,r])=>{const o=el("option",{value:k},r.label);if(k===roleVal)o.selected=true;rs.appendChild(o);});
  rs.addEventListener("change",e=>{roleVal=e.target.value;updateAcces();});
  rg.appendChild(rs);form.appendChild(rg);
  
  // Affichage accès
  const accBox=el("div",{style:{background:"#f0eeea",border:"1px solid #dddad2",borderRadius:"6px",padding:"0.8rem 1rem",marginBottom:"1.5rem"}});
  accBox.appendChild(el("div",{style:{fontSize:"11px",color:"#8a8278",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"6px"}},"Accès de ce rôle"));
  const accDiv=el("div",{style:{fontSize:"12px",color:"#8a8278"}});
  function updateAcces(){
    accDiv.innerHTML="";
    ROLES[roleVal||"employe"].acces.forEach(a=>{
      const d=document.createElement("div");
      d.textContent="✓ "+{devis:"Devis",planning:"Planning",clients:"Clients",employes:"Gestion équipe",parametres:"Paramètres",fiches:"Fiches techniques"}[a];
      accDiv.appendChild(d);
    });
  }
  updateAcces();
  accBox.appendChild(accDiv);form.appendChild(accBox);
  
  // Message résultat
  const msgDiv=el("div",{style:{display:"none",borderRadius:"6px",padding:"0.7rem 1rem",marginBottom:"1rem",fontSize:"13px"}});
  form.appendChild(msgDiv);
  
  const btns=el("div",{style:{display:"flex",gap:"0.8rem",justifyContent:"flex-end"}});
  const ba=el("button",{type:"button",style:BS},"Annuler");ba.addEventListener("click",()=>set({modal:null}));btns.appendChild(ba);
  const bs=el("button",{type:"submit",style:BP},"Générer le lien");btns.appendChild(bs);form.appendChild(btns);
  
  form.addEventListener("submit",async e=>{
    e.preventDefault();
    if(!emailVal||!nomVal){msgDiv.style.display="block";msgDiv.style.background="rgba(163,45,45,0.15)";msgDiv.style.border="1px solid rgba(163,45,45,0.3)";msgDiv.style.color="#e07070";msgDiv.textContent="Remplis le nom et l'email.";return;}

    bs.disabled=true;bs.textContent="Création en cours...";
    try{
      const {compte,lien}=creerCompte(emailVal,nomVal,roleVal||"employe");
      // Afficher le lien à copier
      msgDiv.style.display="flex";
      msgDiv.style.background="rgba(59,109,17,0.15)";
      msgDiv.style.border="1px solid rgba(59,109,17,0.3)";
      msgDiv.style.color="#7acc50";
      msgDiv.style.flexDirection="column";
      msgDiv.style.gap="8px";
      msgDiv.innerHTML="";
      const titre=document.createElement("div");
      titre.style.fontWeight="600";titre.style.fontSize="14px";
      titre.textContent="✓ Compte créé pour "+nomVal+" !";
      msgDiv.appendChild(titre);
      const desc=document.createElement("div");
      desc.style.fontSize="12px";desc.style.color="#a0c880";
      desc.textContent="Envoie ce lien par SMS ou WhatsApp. Il cliquera dessus et choisira son PIN :";
      msgDiv.appendChild(desc);
      const lienBox=document.createElement("div");
      lienBox.style.cssText="background:#f0eeea;border:1px solid rgba(59,109,17,0.3);border-radius:6px;padding:10px 12px;font-size:11px;color:#6a8a40;word-break:break-all;cursor:pointer;line-height:1.5;";
      lienBox.textContent=lien;
      lienBox.title="Cliquer pour copier";
      lienBox.addEventListener("click",()=>{
        navigator.clipboard.writeText(lien).then(()=>{
          lienBox.style.background="rgba(59,109,17,0.15)";
          lienBox.textContent="✓ Copié dans le presse-papier !";
          setTimeout(()=>{lienBox.style.background="";lienBox.textContent=lien;},2500);
        }).catch(()=>{
          prompt("Copie ce lien :",lien);
        });
      });
      msgDiv.appendChild(lienBox);
      const hint=document.createElement("div");
      hint.style.cssText="font-size:11px;color:#5a7040;";
      hint.textContent="Il clique → choisit son PIN → accède au CRM. Clique sur le lien pour copier.";
      msgDiv.appendChild(hint);
      bs.textContent="Lien généré ✓";
      const bClose=document.createElement("button");
      bClose.style.cssText="background:#c9a84c;color:#111;border:none;padding:8px 16px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;margin-top:4px;align-self:flex-start;";
      bClose.textContent="Fermer";
      bClose.addEventListener("click",()=>set({modal:null,onglet:"employes"}));
      msgDiv.appendChild(bClose);
    }catch(err){
      msgDiv.style.display="block";msgDiv.style.background="rgba(163,45,45,0.15)";msgDiv.style.border="1px solid rgba(163,45,45,0.3)";msgDiv.style.color="#e07070";msgDiv.textContent="Erreur : "+err.message;
      bs.disabled=false;bs.textContent="Générer le lien";
    }
  });
  
  wrap.appendChild(form);return wrap;
}

    const btn=el("button",{style:{padding:isMobile()?"10px 18px":"8px 20px",background:active?"#c9a84c":"#ffffff",color:active?"#ffffff":"#706a62",border:`1.5px solid ${active?"#c9a84c":"#dddad2"}`,borderRadius:"30px",fontSize:isMobile()?"14px":"13px",fontWeight:active?"600":"400",cursor:"pointer",WebkitAppearance:"none",boxShadow:active?"0 2px 8px rgba(201,168,76,0.3)":"0 1px 3px rgba(0,0,0,0.06)",transition:"all 0.15s"}},t.label);
    btn.addEventListener("click",()=>set({ficheTab:key}));
    tabs.appendChild(btn);
  });
  wrap.appendChild(tabs);
  const fiche=FICHES[S.ficheTab];
  if(!fiche)return wrap;
  wrap.appendChild(el("h2",{style:{fontFamily:"'Cormorant Garamond',serif",color:"#1a1611",fontSize:"24px",fontWeight:"400",marginBottom:"2rem"}},fiche.titre));
  const matSection=el("div",{style:{background:"#ffffff",border:"1px solid #e8e4dc",borderRadius:"8px",padding:"1.5rem",marginBottom:"2rem"}});
  matSection.appendChild(el("h3",{style:{color:"#c9a84c",fontSize:"12px",fontWeight:"500",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"1rem"}},"Matériel nécessaire"));
  const matGrid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px"}});
  fiche.materiel.forEach(m=>{const row=el("div",{style:{display:"flex",alignItems:"flex-start",gap:"8px",padding:"6px 0",borderBottom:"1px solid #eceae4",fontSize:"13px",color:"#706a62"}});row.appendChild(el("span",{style:{color:"#c9a84c",flexShrink:"0"}},"○"));row.appendChild(el("span",{},m));matGrid.appendChild(row);});
  matSection.appendChild(matGrid);wrap.appendChild(matSection);
  const etSection=el("div",{});
  etSection.appendChild(el("h3",{style:{color:"#c9a84c",fontSize:"12px",fontWeight:"500",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"1rem"}},"Étapes de réalisation"));
  fiche.etapes.forEach((et,i)=>{
    if(isMobile()){
      const mc=el("div",{className:"mob-etape"});
      mc.appendChild(el("div",{className:"mob-etape-num"},"ÉTAPE "+(i+1)));
      mc.appendChild(el("div",{className:"mob-etape-titre"},et.titre));
      mc.appendChild(el("div",{className:"mob-etape-desc"},et.desc));
      etSection.appendChild(mc);
    } else {
      const card=el("div",{style:{background:"#ffffff",border:"1px solid #e8e4dc",borderRadius:"8px",padding:"1.2rem",marginBottom:"8px",display:"flex",gap:"1rem",alignItems:"flex-start"}});
      card.appendChild(el("div",{style:{width:"32px",height:"32px",borderRadius:"50%",background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",color:"#c9a84c",fontWeight:"600",flexShrink:"0"}},String(i+1)));
      const txt=el("div",{});txt.appendChild(el("div",{style:{color:"#2a2520",fontWeight:"500",fontSize:"14px",marginBottom:"4px"}},et.titre));txt.appendChild(el("div",{style:{color:"#8a8278",fontSize:"13px",lineHeight:"1.6"}},et.desc));card.appendChild(txt);etSection.appendChild(card);
    }
  });
  wrap.appendChild(etSection);return wrap;
}

function renderParametres(){
  const wrap=el("div",{style:{maxWidth:"700px"}});
  const tabs=el("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"1.5rem",paddingBottom:"1rem",borderBottom:"1px solid #e8e4dc"}});
  [["infos","Entreprise"],["tarifs","Tarifs"]].forEach(([id,label])=>{
    const active=S.paramTab===id;
    const btn=el("button",{style:{padding:isMobile()?"10px 18px":"8px 20px",background:active?"#c9a84c":"#ffffff",color:active?"#ffffff":"#706a62",border:`1.5px solid ${active?"#c9a84c":"#dddad2"}`,borderRadius:"30px",fontSize:isMobile()?"14px":"13px",fontWeight:active?"600":"400",cursor:"pointer",WebkitAppearance:"none",boxShadow:active?"0 2px 8px rgba(201,168,76,0.3)":"0 1px 3px rgba(0,0,0,0.06)",transition:"all 0.15s"}},label);
    btn.addEventListener("click",()=>set({paramTab:id}));
    tabs.appendChild(btn);
  });
  wrap.appendChild(tabs);
  if(S.paramTab==="infos"){
    wrap.appendChild(el("h3",{style:{fontFamily:"'Cormorant Garamond',serif",color:"#1a1611",fontSize:"20px",fontWeight:"400",marginBottom:"1.5rem"}},"Informations entreprise"));
    [["Raison sociale","nom"],["Forme juridique","forme"],["SIRET","siret"],["N° TVA","tva"],["Adresse","adresse"],["Code postal","cp"],["Ville","ville"],["Téléphone","tel"],["Email","email"],["Président","president"],["Site web","site"]].forEach(([label,key])=>{
      const i=el("input",{value:INFO[key]||""});i.addEventListener("input",e=>INFO[key]=e.target.value);wrap.appendChild(grp(label,i));
    });
    const bs=el("button",{style:{...BP,marginTop:"0.5rem"}},"Sauvegarder");bs.addEventListener("click",()=>{bs.textContent="✓ Sauvegardé !";setTimeout(()=>bs.textContent="Sauvegarder",2000);});wrap.appendChild(bs);
  }else if(S.paramTab==="tarifs"){
    wrap.appendChild(el("h3",{style:{fontFamily:"'Cormorant Garamond',serif",color:"#1a1611",fontSize:"20px",fontWeight:"400",marginBottom:"0.5rem"}},"Tarifs par défaut"));
    wrap.appendChild(el("p",{style:{color:"#8a8278",fontSize:"13px",marginBottom:"1.5rem"}},"Ces tarifs sont pré-remplis lors de la création d'un devis."));
    Object.entries(TARIFS).forEach(([key,sol])=>{
      const card=el("div",{style:{background:"#ffffff",border:"1px solid #e8e4dc",borderRadius:"8px",padding:"1.2rem",marginBottom:"1rem"}});
      const cardHdr=el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}});
      cardHdr.appendChild(el("div",{style:{color:"#c9a84c",fontSize:"11px",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:"500"}},sol.label));
      cardHdr.appendChild(el("div",{style:{fontSize:"11px",color:"#9a9488"}},sol.trav.length+" prestation"+(sol.trav.length!==1?"s":"")));
      card.appendChild(cardHdr);
      function renderRows(){
        // Remove old rows (all children after header)
        while(card.children.length>1)card.removeChild(card.lastChild);
        sol.trav.forEach((t,i)=>{
          const row=el("div",{style:{display:"grid",gridTemplateColumns:isMobile()?"1fr 110px":"1fr 130px 36px",gap:"8px",alignItems:"center",marginBottom:"8px"}});
          const ti=el("input",{value:t,placeholder:"Nom de la prestation",style:{padding:"0.5rem 0.8rem",fontSize:"13px"}});
          ti.addEventListener("input",e=>{TARIFS[key].trav[i]=e.target.value;});
          const pw=el("div",{style:{position:"relative"}});
          const pi=el("input",{type:"number",value:sol.prix[i],style:{padding:"0.5rem 0.8rem",fontSize:"13px",paddingRight:"44px"}});
          pi.addEventListener("input",e=>{TARIFS[key].prix[i]=parseFloat(e.target.value)||0;});
          pw.appendChild(pi);
          pw.appendChild(el("span",{style:{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",color:"#8a8278",fontSize:"11px",pointerEvents:"none"}},"€/m²"));
          row.appendChild(ti);row.appendChild(pw);
          if(!isMobile()){
            const bDel=el("button",{type:"button",style:{width:"36px",height:"36px",borderRadius:"6px",border:"1px solid rgba(163,45,45,0.25)",background:"rgba(163,45,45,0.05)",color:"#A32D2D",fontSize:"15px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0",WebkitAppearance:"none"}},"🗑");
            bDel.addEventListener("click",()=>{
              TARIFS[key].trav.splice(i,1);
              TARIFS[key].prix.splice(i,1);
              cardHdr.querySelector("div:last-child").textContent=sol.trav.length+" prestation"+(sol.trav.length!==1?"s":"");
              renderRows();
            });
            row.appendChild(bDel);
          }
          card.appendChild(row);
        });
        const badd=el("button",{type:"button",style:{...BS,fontSize:"12px",marginTop:"4px",padding:"0.4rem 0.8rem"}},"+ Ajouter une prestation");
        badd.addEventListener("click",()=>{TARIFS[key].trav.push("Nouvelle prestation");TARIFS[key].prix.push(0);cardHdr.querySelector("div:last-child").textContent=sol.trav.length+" prestation"+(sol.trav.length!==1?"s":"");renderRows();});
        card.appendChild(badd);
      }
      renderRows();
      wrap.appendChild(card);
    });
    const bs=el("button",{style:BP},"💾  Sauvegarder les tarifs");
    bs.addEventListener("click",async()=>{
      bs.textContent="Sauvegarde en cours...";bs.disabled=true;
      await saveTarifsToSupabase();
      bs.textContent="✓ Sauvegardé sur tous les appareils !";bs.style.background="#3B6D11";bs.disabled=false;
      setTimeout(()=>{bs.textContent="💾  Sauvegarder les tarifs";bs.style.background="#c9a84c";},3000);
    });
    wrap.appendChild(bs);
  }
  return wrap;
}

const DEMO_DEVIS=[
  // Mode démo — vide. Tes vrais devis apparaîtront ici une fois connecté à Supabase.
];

function render(){
  const app=document.getElementById("app");app.innerHTML="";
  if(S.page==="setup")app.appendChild(renderSetup());
  else if(S.page==="login")app.appendChild(renderLogin());
  else app.appendChild(renderCRM());
}

(function(){
  // Version check — si nouvelle version déployée, reset les comptes corrompus
  const VERSION="v4";
  if(localStorage.getItem("msn_version")!==VERSION){
    // Garder les devis mais reset les comptes pour repartir propre
    const devis=localStorage.getItem("msn_devis");
    localStorage.clear();
    if(devis)localStorage.setItem("msn_devis",devis);
    localStorage.setItem("msn_version",VERSION);
  }
  initDirecteur();
  // Vérifier si lien d'activation (?setup=TOKEN)
  const params = new URLSearchParams(window.location.search);
  const newuser = params.get("newuser");
  const setupToken = params.get("setup");
  const emailParam = params.get("email");
  // Sync comptes depuis un autre appareil (?sync_comptes=BASE64)
  const syncData = params.get("sync_comptes");
  if(syncData){
    try{
      const imported=JSON.parse(decodeURIComponent(syncData));
      if(Array.isArray(imported)&&imported.length){
        const existing=getComptes();
        const merged=imported.map(imp=>{
          const found=existing.find(e=>e.id===imp.id||e.email===imp.email);
          return found?{...imp,pin_hash:found.pin_hash??imp.pin_hash}:imp;
        });
        saveComptes(merged);
      }
    }catch{}
    const clean=window.location.pathname;
    window.history.replaceState({},"",clean);
  }
  if(newuser){
    // Nouveau compte employé — décoder les infos
    try{
      const data=JSON.parse(atob(decodeURIComponent(newuser)));
      S.page="setup";S.setupMode=true;S.setupToken=newuser;S.setupEmail=data.email||"";
    }catch{
      S.page="login";
    }
    render();return;
  }
  if(setupToken){
    S.page="setup";S.setupMode=true;S.setupToken=setupToken;S.setupEmail=emailParam||"";
    render();return;
  }
  // Vérifier session existante
  const session=getSession();
  if(session){
    S={...S,page:"crm",session,role:session.role,devis:[],loading:true};
    loadTarifsFromSupabase();startPolling();
    loadDevisFromSupabase().then(devis=>{S.devis=devis.length?devis:DEMO_DEVIS;S.loading=false;render();});
  }else{
    // Vérifier si le directeur n'a pas encore de PIN
    const comptes=getComptes();
    const directeur=comptes.find(c=>c.role==="directeur");
    if(directeur&&!directeur.pin_hash){
      // Premier lancement - setup du directeur
      S.page="setup";S.setupMode=true;
      S.setupToken="DIRECTEUR_SETUP";
      S.setupEmail=directeur.email;
      render();return;
    }
    if(emailParam)S.loginEmail=emailParam;
  }
  render();
})();
</script>
