async function api(path,opts={},token=null){
  try{const r=await fetch(`${SUPA_URL}/rest/v1/${path}`,{headers:{apikey:SUPA_KEY,Authorization:`Bearer ${token||SUPA_KEY}`,"Content-Type":"application/json",Prefer:"return=representation"},...opts});const t=await r.text();return t?JSON.parse(t):null;}catch{return null;}
}

async function authLogin(email,pwd){
  const r=await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`,{method:"POST",headers:{apikey:SUPA_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password:pwd})});
  const d=await r.json();if(!r.ok)throw new Error(d.error_description||"Email ou mot de passe incorrect");return d;
}

async function authLogout(token){try{await fetch(`${SUPA_URL}/auth/v1/logout`,{method:"POST",headers:{apikey:SUPA_KEY,Authorization:`Bearer ${token}`}});}catch{}}

async function authUser(token){
  try{
    const r=await fetch(`${SUPA_URL}/auth/v1/user`,{headers:{apikey:SUPA_KEY,Authorization:`Bearer ${token}`}});
    if(!r.ok)return null;
    const user=await r.json();
    const pr=await fetch(`${SUPA_URL}/rest/v1/profiles?id=eq.${user.id}&select=role,nom,email,actif`,{headers:{apikey:SUPA_KEY,Authorization:`Bearer ${token}`,Accept:"application/json"}});

    return user;
  }catch{return null;}
}

function el(tag,props,...kids){
  const e=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="className")e.className=v;else e.setAttribute(k,v);});
  kids.flat(99).forEach(c=>{if(c!=null&&c!==false)e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});
  return e;
}

function renderParametres(){

    Object.entries(TARIFS).forEach(([key,sol])=>{
      const card=el("div",{style:{background:"#111",border:"1px solid #1e1e1e",borderRadius:"8px",padding:"1.2rem",marginBottom:"1rem"}});
      card.appendChild(el("div",{style:{color:"#c9a84c",fontSize:"11px",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"1rem",fontWeight:"500"}},sol.label));

        row.appendChild(ti);row.appendChild(pw);card.appendChild(row);
      });
      const badd=el("button",{type:"button",style:{...BS,fontSize:"12px",marginTop:"8px",padding:"0.4rem 0.8rem"}},"+ Ajouter une prestation");

(async function(){
  const token=localStorage.getItem("msn_token");
  if(token){
    const user=await authUser(token);
    if(user){
      const role=user.role||user.user_metadata?.role||"employe";
      const devis=await api("devis?order=created_at.desc",{},token)||DEMO_DEVIS;
      const profiles=await fetchProfiles(token);
      S={...S,page:"crm",token,user,role,devis,profiles:profiles||[],loading:false};
    }else{localStorage.removeItem("msn_token");}
  }
  render();
})();
