// ── API ────────────────────────────────────────────────────────
async function api(path, opts={}, token=null) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    headers: {apikey:SUPA_KEY, Authorization:`Bearer ${token||SUPA_KEY}`, "Content-Type":"application/json", Prefer:"return=representation"},
    ...opts
  });
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

async function login(email, pwd) {
  const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
    method:"POST", headers:{apikey:SUPA_KEY,"Content-Type":"application/json"},
    body:JSON.stringify({email,password:pwd})
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error_description || d.msg || "Email ou mot de passe incorrect");
  return d;
}

async function logout(token) {
  await fetch(`${SUPA_URL}/auth/v1/logout`, {method:"POST", headers:{apikey:SUPA_KEY,Authorization:`Bearer ${token}`}});
}

async function getUser(token) {
  const r = await fetch(`${SUPA_URL}/auth/v1/user`, {headers:{apikey:SUPA_KEY,Authorization:`Bearer ${token}`}});
  if (!r.ok) return null;
  return await r.json();
}

// ── HELPERS UI ─────────────────────────────────────────────────
function el(tag, props, ...children) {
  const e = document.createElement(tag);
  if(props) Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className") e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false) return;
    e.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(c) : c);
  });
  return e;
}

  if(!filtered.length) {
    const tr = el("tr",{});
    tr.appendChild(el("td",{colSpan:"7",style:{padding:"2rem",textAlign:"center",color:"#4a4030",fontSize:"13px"}},'Aucun devis — clique sur "+ Nouveau devis" pour commencer'));
    tbody.appendChild(tr);
  }
  filtered.forEach(d=>{
    const tr = el("tr",{style:{borderBottom:"1px solid #1a1a1a"}});
    tr.addEventListener("mouseenter",()=>tr.style.background="#161616");
    tr.addEventListener("mouseleave",()=>tr.style.background="");
    tr.appendChild(el("td",{style:{padding:"0.8rem 1rem",fontSize:"12px",color:"#c9a84c",fontWeight:"600"}},d.numero||"—"));
    tr.appendChild(el("td",{style:{padding:"0.8rem 1rem",fontSize:"13px",color:"#e0d8cc",fontWeight:"500"}},d.client_nom));
    tr.appendChild(el("td",{style:{padding:"0.8rem 1rem",fontSize:"12px",color:"#7a7060"}},d.ville||"—"));
    tr.appendChild(el("td",{style:{padding:"0.8rem 1rem",fontSize:"12px",color:"#7a7060"}},TARIFS[d.type_sol]?.label||d.type_sol));
    tr.appendChild(el("td",{style:{padding:"0.8rem 1rem",fontSize:"13px",color:"#f0ece4",fontWeight:"600"}},((d.montant_ht||0).toFixed(0))+" €"));
    const tdS = el("td",{style:{padding:"0.8rem 1rem"}});
    tdS.appendChild(badge(d.statut));
    tr.appendChild(tdS);
    const tdA = el("td",{style:{padding:"0.8rem 1rem"}});
    const acts = el("div",{style:{display:"flex",gap:"6px"}});
    const bVoir = el("button",{style:{...BS,padding:"3px 8px",fontSize:"11px"}},"Voir");
    bVoir.addEventListener("click",()=>setState({modal:"detail",selected:d}));
    acts.appendChild(bVoir);
    const bPDF = el("button",{style:{...BS,padding:"3px 8px",fontSize:"11px"}},"PDF");
    bPDF.addEventListener("click",()=>genPDF(d,"devis"));
    acts.appendChild(bPDF);
    if(d.statut!=="Gagné"){
      const bFact = el("button",{style:{...BS,padding:"3px 8px",fontSize:"11px",color:"#3B6D11",borderColor:"#3B6D1144"}},"→ Facture");
      bFact.addEventListener("click",()=>{ const f={...d,statut:"Gagné"}; STATE.devis=STATE.devis.map(x=>x.numero===d.numero?f:x); genPDF(f,"facture"); render(); });
      acts.appendChild(bFact);
    }
    tdA.appendChild(acts);
    tr.appendChild(tdA);
    tbody.appendChild(tr);
  });
  t.appendChild(tbody);
  tbl.appendChild(t);
  wrap.appendChild(tbl);
  return wrap;
}

// ── MODAL ──────────────────────────────────────────────────────
function renderModal() {
  const overlay = el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.7)",zIndex:"1000",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}});
  overlay.addEventListener("click",e=>{ if(e.target===overlay) setState({modal:null,selected:null}); });

  const box = el("div",{style:{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"8px",width:"100%",maxWidth:"640px",maxHeight:"90vh",overflow:"auto"}});
  const hdr = el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"1.2rem 1.5rem",borderBottom:"1px solid #1e1e1e"}});
  hdr.appendChild(el("h2",{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:"22px",color:"#f0ece4",fontWeight:"400"}},STATE.modal==="nouveau"?"Nouveau devis":`Devis ${STATE.selected?.numero||""}`));
  const btnX = el("button",{style:{background:"none",border:"none",color:"#666",fontSize:"22px",lineHeight:"1"}},"×");
  btnX.addEventListener("click",()=>setState({modal:null,selected:null}));
  hdr.appendChild(btnX);
  box.appendChild(hdr);

  const body = el("div",{style:{padding:"1.5rem"}});
  if(STATE.modal==="nouveau") body.appendChild(renderFormDevis());
  else if(STATE.modal==="detail"&&STATE.selected) body.appendChild(renderDetailDevis(STATE.selected));
  box.appendChild(body);
  overlay.appendChild(box);
  return overlay;
}

// ── FORMULAIRE DEVIS ───────────────────────────────────────────
function renderFormDevis() {
  const f = STATE.form;
  const tarif = TARIFS[f.type_sol];
  const ht = f.surface ? Math.round(f.prix_m2 * parseFloat(f.surface) * COEFF[f.etat]) : 0;

  const form = el("form",{});

  function row(...items) {
    const g = el("div",{style:{display:"grid",gridTemplateColumns:`repeat(${items.length},1fr)`,gap:"1rem",marginBottom:"1rem"}});
    items.forEach(i=>g.appendChild(i));
    return g;
  }
  function grp(label, input) {
    const g = el("div",{});
    g.appendChild(el("label",{style:{display:"block",fontSize:"11px",letterSpacing:"0.1em",textTransform:"uppercase",color:"#6a6050",marginBottom:"5px"}},label));
    g.appendChild(input);
    return g;
  }
  function inp(name, placeholder, type="text") {
    const i = el("input",{type,placeholder,value:f[name]||""});
    i.addEventListener("input",e=>{ STATE.form[name]=e.target.value; if(name==="surface"||name==="prix_m2") render(); });
    return i;
  }
  function sel(name, options) {
    const s = el("select",{});
    options.forEach(([v,l])=>{ const o=el("option",{value:v},l); if(f[name]===v||(!v&&!f[name])) o.selected=true; s.appendChild(o); });
    s.addEventListener("change",e=>{
      STATE.form[name]=e.target.value;
      if(name==="type_sol"){ STATE.form.travaux=TARIFS[e.target.value].trav[0]; STATE.form.prix_m2=TARIFS[e.target.value].prix[0]; }
      if(name==="travaux"){ const idx=TARIFS[STATE.form.type_sol].trav.indexOf(e.target.value); STATE.form.prix_m2=TARIFS[STATE.form.type_sol].prix[idx]||STATE.form.prix_m2; }
      render();
    });
    return s;
  }

  form.appendChild(row(grp("Nom client *",inp("client_nom","Jean Dupont")),grp("Téléphone",inp("client_tel","06 12 34 56 78"))));
  form.appendChild(row(grp("Email",inp("client_email","client@email.com")),grp("Ville",inp("ville","Paris"))));
  form.appendChild(el("div",{style:{height:"1px",background:"#1e1e1e",margin:"0.5rem 0 1rem"}}));
  form.appendChild(row(
    grp("Type de sol *",sel("type_sol",Object.entries(TARIFS).map(([k,v])=>[k,v.label]))),
    grp("État du sol",sel("etat",[["bon","Bon état"],["moyen","État moyen"],["mauvais","Mauvais état"]]))
  ));
  form.appendChild(row(
    grp("Travaux *",sel("travaux",tarif.trav.map((t,i)=>[t,`${t} — ${tarif.prix[i]} €/m²`]))),
    grp("Surface (m²) *",inp("surface","50","number")),
    grp("Prix/m²",inp("prix_m2","","number"))
  ));
  const ta = el("textarea",{placeholder:"Précisions sur le chantier...",style:{minHeight:"70px",resize:"vertical",marginBottom:"1rem"}});
  ta.textContent = f.description||"";
  ta.addEventListener("input",e=>STATE.form.description=e.target.value);
  form.appendChild(grp("Notes",ta));

  // Récap
  if(f.surface>0) {
    const recap = el("div",{style:{background:"#0a0a0a",border:"1px solid rgba(201,168,76,0.2)",borderRadius:"6px",padding:"1rem",marginBottom:"1.2rem"}});
    recap.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},[el("span",{style:{color:"#7a7060",fontSize:"13px"}},`${f.surface} m² × ${f.prix_m2} €/m² × coeff. ${COEFF[f.etat]}`)]));
    recap.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},[el("span",{style:{color:"#a09080",fontSize:"13px"}},"Montant HT"),el("span",{style:{color:"#f0ece4",fontSize:"15px",fontWeight:"600"}},ht.toFixed(2)+" €")]));
    recap.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between"}},[el("span",{style:{color:"#a09080",fontSize:"13px"}},"TTC (TVA 20%)"),el("span",{style:{color:"#c9a84c",fontSize:"17px",fontWeight:"700"}},(ht*1.2).toFixed(2)+" €")]));
    form.appendChild(recap);
  }

  const btns = el("div",{style:{display:"flex",gap:"0.8rem",justifyContent:"flex-end"}});
  const bAnn = el("button",{type:"button",style:BS},"Annuler");
  bAnn.addEventListener("click",()=>setState({modal:null}));
  btns.appendChild(bAnn);
  const bSave = el("button",{type:"submit",style:BP},"Créer le devis");
  btns.appendChild(bSave);
  form.appendChild(btns);

  form.addEventListener("submit",async e=>{
    e.preventDefault();
    const num = `MSN-${Date.now().toString().slice(-6)}`;
    const payload = {...STATE.form, numero:num, montant_ht:ht, statut:"Devis envoyé", created_at:new Date().toISOString()};
    try { await api("devis",{method:"POST",body:JSON.stringify(payload)},STATE.token); } catch{}
    STATE.devis = [payload, ...STATE.devis];
    STATE.form = {client_nom:"",client_tel:"",client_email:"",ville:"",type_sol:"marbre",travaux:"Polissage simple",surface:"",etat:"moyen",description:"",prix_m2:30};
    setState({modal:null});
  });

  return form;
}

// ── DETAIL DEVIS ───────────────────────────────────────────────
function renderDetailDevis(d) {
  const wrap = el("div",{style:{display:"grid",gap:"0.8rem"}});
  const grid = el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.8rem"}});
  [["Client",d.client_nom],["Téléphone",d.client_tel],["Email",d.client_email],["Ville",d.ville],["Type de sol",TARIFS[d.type_sol]?.label],["Surface",d.surface+" m²"],["Travaux",d.travaux],["Prix/m²",d.prix_m2+" €"]].forEach(([k,v])=>{
    const c = el("div",{style:{background:"#0d0d0d",borderRadius:"4px",padding:"0.7rem 1rem"}});
    c.appendChild(el("div",{style:{fontSize:"10px",color:"#5a5040",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"4px"}},k));
    c.appendChild(el("div",{style:{fontSize:"14px",color:"#e0d8cc"}},v||"—"));
    grid.appendChild(c);
  });
  wrap.appendChild(grid);

  const ttc = el("div",{style:{background:"#0a0a0a",border:"1px solid rgba(201,168,76,0.2)",borderRadius:"6px",padding:"1rem",display:"flex",justifyContent:"space-between",alignItems:"center"}});
  ttc.appendChild(el("span",{style:{color:"#a09080"}},"Montant TTC"));
  ttc.appendChild(el("span",{style:{color:"#c9a84c",fontSize:"22px",fontFamily:"'Cormorant Garamond',serif"}},((d.montant_ht||0)*1.2).toFixed(2)+" €"));
  wrap.appendChild(ttc);

  const sg = el("div",{});
  sg.appendChild(el("label",{style:{display:"block",fontSize:"11px",letterSpacing:"0.1em",textTransform:"uppercase",color:"#6a6050",marginBottom:"5px"}},"Changer le statut"));
  const ssel = el("select",{style:{padding:"0.65rem 0.9rem"}});
  STATUTS.forEach(s=>{ const o=el("option",{},s); if(s===d.statut) o.selected=true; ssel.appendChild(o); });
  ssel.addEventListener("change",async e=>{
    const ns = e.target.value;
    STATE.devis = STATE.devis.map(x=>x.numero===d.numero?{...x,statut:ns}:x);
    STATE.selected = {...d,statut:ns};
    try { await api(`devis?numero=eq.${d.numero}`,{method:"PATCH",body:JSON.stringify({statut:ns})},STATE.token); } catch{}
    render();
  });
  sg.appendChild(ssel);
  wrap.appendChild(sg);

  const btns = el("div",{style:{display:"flex",gap:"0.8rem",justifyContent:"flex-end",flexWrap:"wrap"}});
  const bC = el("button",{style:BS},"Fermer"); bC.addEventListener("click",()=>setState({modal:null,selected:null})); btns.appendChild(bC);
  const bP = el("button",{style:BP},"Imprimer PDF"); bP.addEventListener("click",()=>genPDF(d,"devis")); btns.appendChild(bP);
  const bF = el("button",{style:{...BP,background:"#3B6D11",color:"#fff"}},"→ Convertir en facture");
  bF.addEventListener("click",()=>{ const f={...d,statut:"Gagné"}; STATE.devis=STATE.devis.map(x=>x.numero===d.numero?f:x); genPDF(f,"facture"); setState({modal:null,selected:null}); });
  btns.appendChild(bF);
  wrap.appendChild(btns);
  return wrap;
}

// ── PLANNING ───────────────────────────────────────────────────
function renderPlanning() {
  const wrap = el("div",{});
  const today = new Date();
  const jours = ["Lun","Mar","Mer","Jeu","Ven","Sam"];
  const debut = new Date(today);
  debut.setDate(today.getDate()-today.getDay()+1+STATE.semaine*7);

  const nav = el("div",{style:{display:"flex",gap:"0.8rem",marginBottom:"1.5rem",alignItems:"center",flexWrap:"wrap"}});
  const bP = el("button",{style:BS},"← Précédente"); bP.addEventListener("click",()=>setState({semaine:STATE.semaine-1})); nav.appendChild(bP);
  nav.appendChild(el("span",{style:{color:"#e0d8cc",fontSize:"14px",fontWeight:"500"}},`Semaine du ${debut.toLocaleDateString("fr-FR",{day:"numeric",month:"long"})}`));
  const bN = el("button",{style:BS},"Suivante →"); bN.addEventListener("click",()=>setState({semaine:STATE.semaine+1})); nav.appendChild(bN);
  const bT = el("button",{style:{...BS,marginLeft:"auto"}},"Aujourd'hui"); bT.addEventListener("click",()=>setState({semaine:0})); nav.appendChild(bT);
  wrap.appendChild(nav);

  const grid = el("div",{style:{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"4px",marginBottom:"2rem"}});
  const chantiers = STATE.devis.filter(d=>d.statut==="Devis envoyé"||d.statut==="Gagné");
  jours.forEach((jour,i)=>{
    const date = new Date(debut); date.setDate(debut.getDate()+i);
    const isToday = date.toDateString()===today.toDateString();
    const cell = el("div",{style:{background:isToday?"rgba(201,168,76,0.08)":"#111",border:`1px solid ${isToday?"rgba(201,168,76,0.3)":"#1e1e1e"}`,borderRadius:"8px",padding:"0.8rem",minHeight:"120px"}});
    cell.appendChild(el("div",{style:{fontSize:"10px",letterSpacing:"0.1em",textTransform:"uppercase",color:isToday?"#c9a84c":"#5a5040",marginBottom:"4px"}},jour));
    cell.appendChild(el("div",{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:"16px",color:isToday?"#c9a84c":"#7a7060",marginBottom:"8px"}},String(date.getDate())));
    if(chantiers[i]) {
      const chip = el("div",{style:{background:"rgba(59,139,212,0.15)",border:"1px solid rgba(59,139,212,0.3)",borderRadius:"4px",padding:"4px 6px",fontSize:"11px",color:"#3B8BD4"}},chantiers[i].client_nom);
      cell.appendChild(chip);
    }
    grid.appendChild(cell);
  });
  wrap.appendChild(grid);

  wrap.appendChild(el("h3",{style:{fontFamily:"'Cormorant Garamond',serif",color:"#f0ece4",fontSize:"18px",fontWeight:"400",marginBottom:"1rem"}},"Chantiers à planifier"));
  if(!chantiers.length) { wrap.appendChild(el("p",{style:{color:"#4a4030",fontSize:"13px"}},"Aucun chantier — crée des devis pour les voir ici.")); }
  chantiers.forEach(d=>{
    const row = el("div",{style:{background:"#111",border:"1px solid #1e1e1e",borderRadius:"8px",padding:"0.9rem 1.2rem",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"0.5rem",marginBottom:"8px"}});
    row.appendChild(el("div",{},[el("span",{style:{color:"#e0d8cc",fontWeight:"500",fontSize:"14px"}},d.client_nom),el("span",{style:{color:"#5a5040",fontSize:"12px",marginLeft:"10px"}},d.ville||"")]));
    row.appendChild(el("div",{style:{fontSize:"12px",color:"#7a7060"}},`${TARIFS[d.type_sol]?.label} · ${d.surface} m²`));
    row.appendChild(el("div",{style:{fontSize:"13px",color:"#c9a84c",fontWeight:"600"}},((d.montant_ht||0)*1.2).toFixed(0)+" € TTC"));
    row.appendChild(badge(d.statut));
    wrap.appendChild(row);
  });
  return wrap;
}

// ── CLIENTS ────────────────────────────────────────────────────
function renderClients() {
  const map = {};
  STATE.devis.forEach(d=>{
    if(!map[d.client_nom]) map[d.client_nom]={nom:d.client_nom,tel:d.client_tel,email:d.client_email,ville:d.ville,nb:0,ca:0};
    map[d.client_nom].nb++;
    if(d.statut==="Gagné") map[d.client_nom].ca+=d.montant_ht||0;
  });
  const clients = Object.values(map);
  const grid = el("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"1rem"}});
  if(!clients.length) grid.appendChild(el("p",{style:{color:"#4a4030",fontSize:"13px",gridColumn:"1/-1"}},"Aucun client pour l'instant."));
  clients.forEach(c=>{
    const card = el("div",{style:{background:"#111",border:"1px solid #1e1e1e",borderRadius:"8px",padding:"1.2rem"}});
    const top = el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"0.8rem"}});
    const av = el("div",{style:{width:"38px",height:"38px",borderRadius:"50%",background:"rgba(201,168,76,0.12)",border:"1px solid rgba(201,168,76,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",color:"#c9a84c",fontWeight:"600",flexShrink:"0"}},c.nom.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase());
    const inf = el("div",{},[el("div",{style:{color:"#e0d8cc",fontWeight:"500",fontSize:"14px"}},c.nom),el("div",{style:{color:"#5a5040",fontSize:"11px"}},c.ville||"")]);
    top.appendChild(av); top.appendChild(inf); card.appendChild(top);
    card.appendChild(el("div",{style:{fontSize:"12px",color:"#6a6050",marginBottom:"4px"}},c.tel||"—"));
    card.appendChild(el("div",{style:{fontSize:"12px",color:"#6a6050",marginBottom:"0.8rem"}},c.email||"—"));
    const bot = el("div",{style:{display:"flex",justifyContent:"space-between",padding:"0.6rem 0",borderTop:"1px solid #1a1a1a"}});
    bot.appendChild(el("span",{style:{fontSize:"11px",color:"#5a5040"}},c.nb+" devis"));
    bot.appendChild(el("span",{style:{fontSize:"13px",color:"#c9a84c",fontWeight:"600"}},c.ca.toFixed(0)+" € CA"));
    card.appendChild(bot);
    const bND = el("button",{style:{...BS,width:"100%",marginTop:"0.5rem",fontSize:"11px"}},"+ Nouveau devis");
    bND.addEventListener("click",()=>{ STATE.form.client_nom=c.nom; STATE.form.client_tel=c.tel||""; STATE.form.client_email=c.email||""; STATE.form.ville=c.ville||""; setState({onglet:"devis",modal:"nouveau"}); });
    card.appendChild(bND);
    grid.appendChild(card);
  });
  return grid;
}

    const g = el("div",{style:{marginBottom:"1rem"}});

    i.addEventListener("input",e=>INFO[key]=e.target.value);

  Object.entries(TARIFS).forEach(([key,sol])=>{

    sol.trav.forEach((t,i)=>{
      const row = el("div",{style:{display:"flex",justifyContent:"space-between",padding:"4px 0"}});
      row.appendChild(el("span",{style:{fontSize:"13px",color:"#8a8070"}},t));
      row.appendChild(el("span",{style:{fontSize:"13px",color:"#c9a84c",fontWeight:"600"}},sol.prix[i]+" €/m²"));
      c.appendChild(row);

    wrap.appendChild(c);
  });
  const bS = el("button",{style:BP},"Sauvegarder");
  bS.addEventListener("click",()=>{ bS.textContent="✓ Sauvegardé !"; setTimeout(()=>bS.textContent="Sauvegarder",2000); });
  wrap.appendChild(bS);
  return wrap;
}

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if(STATE.page==="login") app.appendChild(renderLogin());
  else app.appendChild(renderCRM());
}

// ── INIT ───────────────────────────────────────────────────────
(async function init() {
  const token = localStorage.getItem("msn_token");
  if(token) {
    const user = await getUser(token);
    if(user) {
      const devis = await api("devis?order=created_at.desc",{},token).catch(()=>DEMO_DEVIS);
      STATE = {...STATE, page:"crm", token, user, devis:devis||DEMO_DEVIS, loading:false};
    } else {
      localStorage.removeItem("msn_token");
    }
  }
  render();
})();
